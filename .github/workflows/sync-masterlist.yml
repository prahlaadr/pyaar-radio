name: Sync YouTube Music

on:
  schedule:
    - cron: '0 8 * * *'    # Daily at 3 AM EST (UTC-5)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write browser auth
        run: echo '${{ secrets.YTMUSIC_BROWSER_AUTH }}' > browser.json

      - name: Verify auth
        run: |
          python -c "
          from ytmusicapi import YTMusic
          yt = YTMusic('browser.json')
          info = yt.get_account_info()
          name = info.get('accountName', '')
          print(f'Authenticated as: {name}')
          if not name:
              raise SystemExit('Auth failed: no account name returned')
          "

      - name: Sync masterlist (liked + monthly playlists)
        run: python sync_liked.py --yes --no-push

      - name: Sync saved albums to JSON
        run: python sync_albums.py

      - name: Sync all playlists to JSON
        run: python sync_playlists.py

      - name: Check for changes
        id: changes
        run: |
          git add public/data/masterlist.csv
          if [ -d albums ]; then git add albums/; fi
          if [ -d playlists ]; then git add playlists/; fi
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: update from YouTube Music ($(date +%Y-%m-%d))"
          git push

      - name: Cleanup
        if: always()
        run: rm -f browser.json

      - name: Alert on failure
        if: failure()
        run: |
          gh issue create \
            --title "Sync failed on $(date +%Y-%m-%d)" \
            --body "The daily YouTube Music sync failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          **Possible causes:**
          - Browser cookies expired (last ~2 years). See CLAUDE.md for refresh steps.
          - YouTube Music API changed.
          - Rate limiting.

          This issue was auto-created by the sync workflow." \
            --label "sync-failure"
        env:
          GH_TOKEN: ${{ github.token }}
