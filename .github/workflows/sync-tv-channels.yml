name: Sync TV Channels

on:
  schedule:
    - cron: '0 12 * * 0'    # Weekly on Sunday at 7 AM EST (UTC-5)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Build TV channels
        run: python scripts/build-tv-channels.py

      - name: Check for changes
        id: changes
        run: |
          git add public/data/tv/channels.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: refresh pyaar.tv channels ($(date +%Y-%m-%d))"
          git push

      - name: Alert on failure
        if: failure()
        run: |
          gh issue create \
            --title "TV channel sync failed on $(date +%Y-%m-%d)" \
            --body "The weekly TV channel sync failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          **Possible causes:**
          - yt-dlp needs updating
          - YouTube channel URLs changed
          - Rate limiting

          This issue was auto-created by the sync workflow." \
            --label "sync-failure"
        env:
          GH_TOKEN: ${{ github.token }}
